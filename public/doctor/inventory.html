<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المخزون | عيادتي</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3f4f6;
        }

        /* Generic modal styling */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .modal.active {
            display: flex;
        }
    </style>
</head>

<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <script src="/js/auth.js"></script>
    <script src="/js/doctor-nav.js"></script>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900"><i class="fa-solid fa-boxes-stacked ml-2 text-indigo-600"></i> إدارة المخزون والمستلزمات</h1>
                <p class="text-gray-500 mt-1 flex items-center gap-2">تتبع الأدوات والمواد الطبية لضمان توفرها دائمًا.</p>
            </div>
            
            <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-plus"></i> إضافة مادة جديدة
            </button>
        </div>

        <!-- Inventory List -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-gray-800 text-lg"><i class="fa-solid fa-list-check ml-2"></i> قائمة الجرد</h3>
                <button onclick="fetchInventory()" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium flex items-center gap-1 transition">
                    <i class="fa-solid fa-rotate-right"></i> تحديث
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-gray-50 text-gray-500 text-sm border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4 font-medium">المادة / الصنف</th>
                            <th class="px-6 py-4 font-medium text-center">الكمية المتوفرة</th>
                            <th class="px-6 py-4 font-medium text-center">الحد الأدنى للتنبيه</th>
                            <th class="px-6 py-4 font-medium text-center">تاريخ آخر تزويد</th>
                            <th class="px-6 py-4 font-medium text-center">الحالة</th>
                            <th class="px-6 py-4 font-medium text-center">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-sm" id="inventoryBody">
                        <tr>
                            <td colspan="6" class="px-6 py-8 text-center text-gray-400">
                                <i class="fa-solid fa-spinner fa-spin fa-2x mb-2 text-indigo-500"></i>
                                <p>جاري تحميل الجرد...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div id="itemModal" class="modal">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-md mx-4 overflow-hidden p-6 relative">
            <button type="button" onclick="closeModal('itemModal')" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark fa-lg"></i></button>
            <h2 id="modalTitle" class="text-xl font-bold mb-4 text-gray-800">إضافة مادة جديدة</h2>
            
            <form id="inventoryForm">
                <input type="hidden" id="itemId">
                
                <div class="mb-4" id="nameContainer">
                    <label class="block text-sm font-medium text-gray-700 mb-1">اسم المادة</label>
                    <input type="text" id="itemName" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none" required placeholder="مثال: كمامات طبية، حقن...">
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">الكمية</label>
                        <input type="number" id="itemQty" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-center focus:ring-2 focus:ring-indigo-500 outline-none" required min="0" step="0.01">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">الوحدة</label>
                        <select id="itemUnit" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="علبة">علبة</option>
                            <option value="قطعة">قطعة</option>
                            <option value="لتر">لتر</option>
                            <option value="عبوة">عبوة</option>
                            <option value="أخرى">أخرى</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4" id="thresholdContainer">
                    <label class="block text-sm font-medium text-gray-700 mb-1">حد التنبيه (أدنى كمية مسموحة)</label>
                    <input type="number" id="itemMin" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-center focus:ring-2 focus:ring-indigo-500 outline-none" required min="1" value="5">
                    <p class="text-xs text-gray-500 mt-1">سيتم تمييز المادة باللون الأحمر إذا قلت الكمية عن هذا الحد.</p>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">تاريخ التزويد</label>
                    <input type="date" id="itemDate" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none" required>
                </div>
                
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-indigo-700 transition">حفظ المعلومات</button>
            </form>
        </div>
    </div>

    <!-- Update Quantity Modal (Quick Add/Remove) -->
    <div id="qtyModal" class="modal">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-xs mx-4 overflow-hidden p-6 relative text-center">
            <button type="button" onclick="closeModal('qtyModal')" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="font-bold text-gray-800 mb-4">تحديث سريع للكمية</h3>
            <p id="quickItemName" class="text-indigo-600 font-bold mb-4"></p>
            
            <div class="flex justify-center items-center gap-4 mb-6">
                <button type="button" onclick="changeQuickQty(-1)" class="w-10 h-10 rounded-full bg-red-100 text-red-600 hover:bg-red-200 transition text-xl font-bold">-</button>
                <input type="number" id="quickQtyInput" class="w-20 border border-gray-300 rounded-lg px-2 py-2 text-center font-bold text-lg focus:outline-none" min="0">
                <button type="button" onclick="changeQuickQty(1)" class="w-10 h-10 rounded-full bg-green-100 text-green-600 hover:bg-green-200 transition text-xl font-bold">+</button>
            </div>
            
            <button type="button" onclick="saveQuickQty()" class="w-full bg-indigo-600 text-white font-bold py-2 rounded-lg hover:bg-indigo-700 transition">تأكيد الكمية</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // Global Auth Config
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        // Modal Utilities
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        let inventoryList = [];
        let currentEditingItem = null;

        const fetchInventory = async () => {
            try {
                const response = await axios.get('/api/inventory');
                inventoryList = response.data;
                renderInventory();
            } catch (error) {
                console.error(error);
                document.getElementById('inventoryBody').innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> خطأ في جلب البيانات.</td></tr>`;
            }
        };

        const renderInventory = () => {
            const tbody = document.getElementById('inventoryBody');
            if (inventoryList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">لا توجد مواد مسجلة في المخزون.</td></tr>`;
                return;
            }

            const rows = inventoryList.map(item => {
                const isLow = item.quantity <= item.min_threshold;
                const statusBadge = isLow 
                    ? `<span class="bg-red-50 text-red-600 px-2 py-1 rounded text-xs font-bold border border-red-200"><i class="fa-solid fa-triangle-exclamation"></i> نفاد وشيك</span>`
                    : `<span class="bg-green-50 text-green-600 px-2 py-1 rounded text-xs font-bold border border-green-200"><i class="fa-solid fa-check"></i> متوفر</span>`;
                
                const rowClass = isLow ? 'bg-red-50/30' : 'hover:bg-gray-50';

                return `
                <tr class="${rowClass} transition border-b border-gray-50">
                    <td class="px-6 py-4 font-bold text-gray-800">${item.item_name}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-lg font-bold ${isLow ? 'text-red-600' : 'text-gray-900'}">${item.quantity}</span> 
                        <span class="text-sm text-gray-500">${item.unit}</span>
                    </td>
                    <td class="px-6 py-4 text-center text-gray-500">${item.min_threshold}</td>
                    <td class="px-6 py-4 text-center text-gray-600" dir="ltr">${new Date(item.last_restocked).toLocaleDateString('en-GB')}</td>
                    <td class="px-6 py-4 text-center">${statusBadge}</td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="openQuickUpdate(${item.id})" class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition" title="تحديث الكمية">
                                <i class="fa-solid fa-boxes-packing"></i>
                            </button>
                            <button onclick="deleteItem(${item.id})" class="w-8 h-8 rounded-full bg-red-50 text-red-600 hover:bg-red-100 transition" title="حذف بالكامل">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            });

            tbody.innerHTML = rows.join('');
        };

        function openAddModal() {
            document.getElementById('inventoryForm').reset();
            document.getElementById('itemId').value = '';
            document.getElementById('nameContainer').style.display = 'block';
            document.getElementById('thresholdContainer').style.display = 'block';
            document.getElementById('itemUnit').disabled = false;
            document.getElementById('modalTitle').textContent = 'إضافة مادة جديدة';
            document.getElementById('itemDate').valueAsDate = new Date();
            openModal('itemModal');
        }

        // Handle Add/Edit Form
        document.getElementById('inventoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('itemId').value;
            
            const data = {
                item_name: document.getElementById('itemName').value,
                quantity: parseFloat(document.getElementById('itemQty').value),
                unit: document.getElementById('itemUnit').value,
                min_threshold: parseFloat(document.getElementById('itemMin').value),
                last_restocked: document.getElementById('itemDate').value
            };

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;

            try {
                if(id) {
                    await axios.put('/api/inventory/' + id, data);
                } else {
                    await axios.post('/api/inventory', data);
                }
                closeModal('itemModal');
                fetchInventory();
            } catch(e) {
                alert('حدث خطأ أثناء الحفظ');
            }
            submitBtn.disabled = false;
        });

        // Quick Update logic
        function openQuickUpdate(id) {
            const item = inventoryList.find(i => i.id === id);
            if(!item) return;
            currentEditingItem = item;
            document.getElementById('quickItemName').textContent = item.item_name;
            document.getElementById('quickQtyInput').value = item.quantity;
            openModal('qtyModal');
        }

        function changeQuickQty(amount) {
            const input = document.getElementById('quickQtyInput');
            let val = parseFloat(input.value) || 0;
            val += amount;
            if(val < 0) val = 0;
            input.value = val;
        }

        async function saveQuickQty() {
            if(!currentEditingItem) return;
            const newQty = parseFloat(document.getElementById('quickQtyInput').value);
            
            try {
                // If quantity increased, update last_restocked date. Otherwise keep it.
                let restockDate = currentEditingItem.last_restocked;
                if(newQty > currentEditingItem.quantity) {
                    restockDate = new Date().toISOString().split('T')[0];
                }

                await axios.put('/api/inventory/' + currentEditingItem.id, {
                    quantity: newQty,
                    last_restocked: restockDate
                });
                
                closeModal('qtyModal');
                fetchInventory();
            } catch (e) {
                alert('فشل تحديث الكمية');
            }
        }

        async function deleteItem(id) {
            if(!confirm('تحذير: هل أنت متأكد من حذف هذه المادة من المخزن نهائياً؟')) return;
            try {
                await axios.delete('/api/inventory/' + id);
                fetchInventory();
            } catch(e) {
                alert('فشل الحذف');
            }
        }

        document.addEventListener('DOMContentLoaded', fetchInventory);
    </script>
</body>
</html>
