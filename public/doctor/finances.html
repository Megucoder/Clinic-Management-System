<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المداخيل | عيادتي</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3f4f6;
        }

        .stat-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
        }

        .stat-card.today::before {
            background-color: #3b82f6;
        }

        .stat-card.month::before {
            background-color: #10b981;
        }

        .stat-card.total::before {
            background-color: #8b5cf6;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-left: 1.5rem;
        }

        .stat-card.today .stat-icon {
            background: #eff6ff;
            color: #3b82f6;
        }

        .stat-card.month .stat-icon {
            background: #ecfdf5;
            color: #10b981;
        }

        .stat-card.total .stat-icon {
            background: #f5f3ff;
            color: #8b5cf6;
        }

        .stat-info h3 {
            color: #6b7280;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .stat-info p {
            color: #1f2937;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 0.25rem;
        }

        .stat-info span.currency {
            font-size: 1rem;
            color: #6b7280;
            font-weight: 400;
        }
    </style>
</head>

<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <script src="/js/auth.js"></script>
    <script src="/js/doctor-nav.js"></script>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">

        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900"><i class="fa-solid fa-vault ml-2 text-blue-600"></i> الحسابات
                المالية للعيادة</h1>
            <p class="text-gray-500 mt-1">نظرة شاملة على الأرباح والمداخيل الخاصة بالمرضى الذين أتموا الدفع.</p>
        </div>

        <!-- Dashboard Widgets -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <!-- Today -->
            <div class="stat-card today">
                <div class="stat-icon"><i class="fa-solid fa-wallet"></i></div>
                <div class="stat-info">
                    <h3>أرباح اليوم</h3>
                    <p id="incomeToday">0 <span class="currency">دج</span></p>
                </div>
            </div>

            <!-- Month -->
            <div class="stat-card month">
                <div class="stat-icon"><i class="fa-solid fa-chart-line"></i></div>
                <div class="stat-info">
                    <h3>أرباح الشهر</h3>
                    <p id="incomeMonth">0 <span class="currency">دج</span></p>
                </div>
            </div>

            <!-- Total -->
            <div class="stat-card total">
                <div class="stat-icon"><i class="fa-solid fa-piggy-bank"></i></div>
                <div class="stat-info">
                    <h3>المداخيل</h3>
                    <p id="incomeTotal">0 <span class="currency">دج</span></p>
                </div>
            </div>

            <!-- Expenses -->
            <div class="stat-card" style="border-right: 4px solid #ef4444;">
                <div class="stat-icon" style="background:#fef2f2; color:#ef4444;"><i class="fa-solid fa-money-bill-wave"></i></div>
                <div class="stat-info">
                    <h3>المصاريف</h3>
                    <p id="expensesTotal">0 <span class="currency">دج</span></p>
                </div>
            </div>

            <!-- Net Profit -->
            <div class="stat-card" style="border-right: 4px solid #16a34a;">
                <div class="stat-icon" style="background:#dcfce7; color:#16a34a;"><i class="fa-solid fa-sack-dollar"></i></div>
                <div class="stat-info">
                    <h3>الربح الصافي</h3>
                    <p id="netProfit">0 <span class="currency">دج</span></p>
                </div>
            </div>
        </div>

        <!-- Detailed List Header -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            
            <!-- Revenue -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800 text-lg"><i class="fa-solid fa-clock-rotate-left ml-2"></i> آخر المداخيل</h3>
                    <button onclick="fetchFinances()"
                        class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1 transition">
                        <i class="fa-solid fa-rotate-right"></i> تحديث
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-right" id="financesTable">
                        <thead class="bg-white text-gray-500 text-sm border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-4 font-medium">الوقت والتاريخ</th>
                                <th class="px-6 py-4 font-medium">البيان</th>
                                <th class="px-6 py-4 font-medium text-left">المبلغ المستلم</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm" id="tableBody">
                            <tr><td colspan="3" class="px-6 py-8 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin fa-2x mb-2 text-blue-500"></i></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Expenses -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800 text-lg"><i class="fa-solid fa-receipt ml-2 text-red-500"></i> سجل المصاريف</h3>
                    <button onclick="document.getElementById('expenseModal').style.display='flex'" class="text-white bg-red-500 hover:bg-red-600 px-3 py-1 rounded-md text-sm font-medium transition flex items-center gap-1">
                        <i class="fa-solid fa-plus"></i> إضافة مصروف
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-right" id="expensesTable">
                        <thead class="bg-white text-gray-500 text-sm border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-4 font-medium">التاريخ</th>
                                <th class="px-6 py-4 font-medium">الصنف / الوصف</th>
                                <th class="px-6 py-4 font-medium text-left">المبلغ</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm" id="expensesBody">
                            <tr><td colspan="3" class="px-6 py-8 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin fa-2x mb-2 text-red-500"></i></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
        
    <!-- Add Expense Modal -->
    <div id="expenseModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50;">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-md mx-4 overflow-hidden p-6 relative">
            <button onclick="document.getElementById('expenseModal').style.display='none'" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark fa-lg"></i></button>
            <h2 class="text-xl font-bold mb-4 text-gray-800">إضافة مصروف جديد</h2>
            <form id="expenseForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">التاريخ</label>
                    <input type="date" id="expDate" class="w-full border border-gray-300 rounded-lg px-3 py-2" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">التصنيف</label>
                    <input type="text" id="expCategory" placeholder="مثال: فاتورة كهرباء، كراء، أدوات..." class="w-full border border-gray-300 rounded-lg px-3 py-2" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">الوصف المرفق</label>
                    <input type="text" id="expDesc" placeholder="ملاحظات..." class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">المبلغ (دج)</label>
                    <input type="number" id="expAmount" class="w-full border border-gray-300 rounded-lg px-3 py-2" required>
                </div>
                <button type="submit" class="w-full bg-red-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-600 transition">حفظ المصروف</button>
            </form>
        </div>
    </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // Global Auth Config
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        // Formatting utilities
        const formatMoney = (amount) => {
            return new Intl.NumberFormat('ar-DZ').format(amount || 0);
        };

        const formatDateTime = (date, time) => {
            const dStr = new Date(date).toLocaleDateString('ar-EG');

            // 12-hour format
            const [h, m] = time.split(':');
            let hr = parseInt(h);
            const ampm = hr >= 12 ? 'م' : 'ص';
            hr = hr % 12 || 12;

            return `<span class="text-gray-500 text-xs ml-2">${dStr}</span> <span class="font-medium" dir="ltr">${hr}:${m} ${ampm}</span>`;
        };

        const fetchFinances = async () => {
            try {
                const response = await axios.get('/api/finances');
                const stats = response.data;

                // Update Cards
                document.getElementById('incomeToday').innerHTML = `${formatMoney(stats.today)} <span class="currency">دج</span>`;
                document.getElementById('incomeMonth').innerHTML = `${formatMoney(stats.month)} <span class="currency">دج</span>`;
                document.getElementById('incomeTotal').innerHTML = `${formatMoney(stats.total)} <span class="currency">دج</span>`;
                
                document.getElementById('expensesTotal').innerHTML = `${formatMoney(stats.totalExpenses)} <span class="currency">دج</span>`;
                document.getElementById('netProfit').innerHTML = `${formatMoney(stats.netProfit)} <span class="currency">دج</span>`;

                // Update Table
                const tbody = document.getElementById('tableBody');
                if (stats.recent.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-gray-500"><i class="fa-solid fa-info-circle ml-1"></i> لا توجد حركات مالية مسجلة بعد.</td></tr>`;
                } else {
                    const rows = stats.recent.map(app => `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4">${formatDateTime(app.date, app.time)}</td>
                            <td class="px-6 py-4 font-medium text-gray-900">
                                <i class="fa-solid fa-user-circle text-gray-400 ml-1"></i> ${app.patient_name}
                            </td>
                            <td class="px-6 py-4 text-left">
                                <span class="inline-flex items-center gap-1 bg-green-50 text-green-700 font-bold px-3 py-1 rounded-full text-sm">
                                    + ${formatMoney(app.price)} دج
                                </span>
                            </td>
                        </tr>
                    `);
                    tbody.innerHTML = rows.join('');
                }
                
                // Fetch Expenses
                fetchExpenses();

            } catch (error) {
                console.error('Error fetching finances', error);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-red-500"><i class="fa-solid fa-triangle-exclamation ml-1"></i> حدث خطأ في النظام أثناء جلب السجلات المالية.</td></tr>`;
            }
        };

        const fetchExpenses = async () => {
            try {
                const res = await axios.get('/api/expenses');
                const expenses = res.data;
                const tbody = document.getElementById('expensesBody');
                if(expenses.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-gray-500"><i class="fa-solid fa-info-circle ml-1"></i> لا توجد مصاريف مسجلة.</td></tr>`;
                    return;
                }
                
                const rows = expenses.map(exp => `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4">${new Date(exp.date).toLocaleDateString('ar-EG')}</td>
                        <td class="px-6 py-4 font-medium text-gray-900">
                            ${exp.category} ${exp.description ? `<span class="text-xs text-gray-500 block">${exp.description}</span>` : ''}
                        </td>
                        <td class="px-6 py-4 text-left d-flex align-center gap-2 justify-end">
                            <span class="inline-flex items-center gap-1 bg-red-50 text-red-700 font-bold px-3 py-1 rounded-full text-sm">
                                - ${formatMoney(exp.amount)} دج
                            </span>
                            ${exp.type === 'expense' ? `
                            <button onclick="deleteExpense(${exp.id})" class="text-gray-400 hover:text-red-500 mr-2" title="إلغاء">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                            ` : `<span class="text-gray-400 text-xs ml-2 mr-2 border border-gray-200 px-2 py-0.5 rounded bg-gray-50" title="لا يمكن حذف الرواتب من هنا"><i class="fa-solid fa-lock"></i></span>`}
                        </td>
                    </tr>
                `);
                tbody.innerHTML = rows.join('');
                
            } catch(error) {
                document.getElementById('expensesBody').innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-red-500"><i class="fa-solid fa-triangle-exclamation ml-1"></i> خطأ في جلب المصاريف.</td></tr>`;
            }
        };
        
        const deleteExpense = async (id) => {
            if(!confirm('هل أنت متأكد من حذف هذا المصروف؟')) return;
            try {
                await axios.delete(`/api/expenses/${id}`);
                fetchFinances(); // Refresh everything to update net profit
            } catch(e) {
                alert('خطأ في الحذف');
            }
        };

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                date: document.getElementById('expDate').value,
                category: document.getElementById('expCategory').value,
                description: document.getElementById('expDesc').value,
                amount: document.getElementById('expAmount').value
            };
            
            try {
                await axios.post('/api/expenses', data);
                document.getElementById('expenseForm').reset();
                document.getElementById('expenseModal').style.display = 'none';
                fetchFinances(); // Refresh everything
            } catch(error) {
                alert('خطأ في الإضافة');
            }
        });

        // initial date setup
        document.getElementById('expDate').valueAsDate = new Date();

        document.addEventListener('DOMContentLoaded', fetchFinances);
    </script>
</body>

</html>
